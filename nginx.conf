server {
    listen 80;
    server_name vookedme.com www.vookedme.com;

    root /usr/share/nginx/html;
    index index.html;

    # Static root files (robots.txt, sitemap, etc.)
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # Architecture page — clean URL
    location = /arquitectura {
        try_files /arquitectura.html =404;
    }

    # Legal pages — clean URLs
    location = /privacidad { try_files /privacidad.html =404; }
    location = /terminos { try_files /terminos.html =404; }
    location = /aviso-legal { try_files /aviso-legal.html =404; }
    location = /cookies { try_files /cookies.html =404; }

    # Static site — serve file or 404
    location / {
        try_files $uri $uri/ =404;
    }

    # Beehiiv subscribe proxy — API key injected via env var
    location = /api/subscribe {
        limit_except POST { deny all; }
        resolver 8.8.8.8 valid=300s;
        resolver_timeout 5s;
        proxy_pass https://api.beehiiv.com/v2/publications/pub_10199e2e-2582-45ff-bf4a-4a3d893a38f1/subscriptions;
        proxy_set_header Host api.beehiiv.com;
        proxy_set_header Authorization "Bearer ${BEEHIIV_TOKEN}";
        proxy_set_header Content-Type "application/json";
        proxy_ssl_server_name on;
    }

    # Cache static assets (with security headers)
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Gzip
    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 256;
}
