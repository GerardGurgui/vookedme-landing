server {
    listen 80;
    server_name vookedme.com www.vookedme.com;

    root /usr/share/nginx/html;
    index index.html;

    # Single page — always serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Beehiiv subscribe proxy — API key stays server-side
    location = /api/subscribe {
        limit_except POST { deny all; }
        resolver 8.8.8.8 valid=300s;
        resolver_timeout 5s;
        proxy_pass https://api.beehiiv.com/v2/publications/pub_10199e2e-2582-45ff-bf4a-4a3d893a38f1/subscriptions;
        proxy_set_header Host api.beehiiv.com;
        proxy_set_header Authorization "Bearer WBoTtPdYoJTtJeBop00IbsMP2VJnMjXZfi5fNHIhsXZMZhQjFF525Rb57oi7YYWi";
        proxy_set_header Content-Type "application/json";
        proxy_ssl_server_name on;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
    gzip_min_length 256;
}
